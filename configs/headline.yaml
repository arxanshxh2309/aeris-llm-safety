# Headline experiment config (full set).
# Run twice: once with defenses=[], once with the full pipeline.
attack_set: datasets/attacks_full.yaml
benign_set: datasets/benigns_full.yaml
defenses:
  - system_prompt_hardener_v1
  - length_guard_v1
  - keyword_filter_v1
  - heuristic_injection_detector_v1
seed: 1337
max_concurrency: 8
